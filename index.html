            const processSliceImage = async (file) => {
                return new Promise((resolve) => {
                    const imgUrl = URL.createObjectURL(file);
                    const img = new Image();
                    img.src = imgUrl;
                    img.onload = () => {
                        const size = Math.max(img.width, img.height);
                        const offsetX = (size - img.width) / 2;
                        const offsetY = (size - img.height) / 2;
                        const rows = sliceRows;
                        const cols = sliceCols;
                        const pieceW = size / cols;
                        const pieceH = size / rows;
                        const newItems = [];
                        for (let row = 0; row < rows; row++) {

                        const rows = sliceRows;
                        const cols = sliceCols;
                        const pieceW = video.videoWidth / cols;
                        const pieceH = video.videoHeight / rows;
                        const newItems = [];
                        for (let i = 0; i < rows * cols; i++) {
                            const row = Math.floor(i / cols);
                            const col = i % cols;
                            newItems.push({
                                id: generateId(),
                                file: file,
                                originalUrl: videoUrl,
                                processedUrl: null,
                                size: 0,
                                status: 'pending',
                                name: `${file.name.replace(/\.[^/.]+$/, "")}_${i+1}.gif`,
                                type: 'video',
                                sliceInfo: { 
                                    type: 'free',
                                    srcX: col * pieceW,
                                    srcY: row * pieceH,
                                    srcW: pieceW,
                                    srcH: pieceH
                                }
                            });
                        }
                        resolve(newItems);
                    };
                });
            };

            const addFiles = async (files) => {
                if (mode === 'slice' || mode === 'free-slice') {
                    setIsGlobalProcessing(true);
                    const validFiles = Array.from(files).filter(f => f.type.match('image.*') || f.type.match('video.*'));
                    if (validFiles.length === 0) {
                        alert('请上传图片或视频文件');
                        setIsGlobalProcessing(false);
                        return;
                    }
                    const allNewItems = [];
                    for (const file of validFiles) {
                        if (file.type.match('image.*')) {
                            const slices = mode === 'free-slice' ? await processFreeSliceImage(file) : await processSliceImage(file);
                            allNewItems.push(...slices);
                        } else if (file.type.match('video.*')) {
                            const slices = mode === 'free-slice' ? await processFreeSliceVideo(file) : await processSliceVideo(file);
                            allNewItems.push(...slices);
                        }
                    }
                    setItems(prev => [...prev, ...allNewItems]);
                    setIsGlobalProcessing(false);
                    return;
                }
                
                // Static / Dynamic Mode
                const newItems = Array.from(files)
                .filter(file => {
                    if (mode === 'static') return file.type.match('image.*');
                    if (mode === 'dynamic') return file.type.match('video.*');
                    return false;
                })
                .map(file => ({
                    id: generateId(),
                    file,
                    originalUrl: URL.createObjectURL(file), 
                    processedUrl: null,
                    size: 0,
                    status: 'pending',
                    name: file.name,
                    type: mode === 'dynamic' ? 'video' : 'image'
                }));
                if (newItems.length === 0) {
                    if (files.length > 0) alert(mode === 'static' ? '请上传图片文件' : '请上传视频文件');
                    return;
                }
                setItems(prev => [...prev, ...newItems]);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                if (e.dataTransfer.files) addFiles(e.dataTransfer.files);
            };

            // --- 核心绘制逻辑 ---
            const drawFrame = (ctx, source, width, height, color, removeEnabled, targetColorHex, tolerance, sliceInfo) => {
                ctx.clearRect(0, 0, width, height);
                if (color !== 'transparent') {
                    ctx.fillStyle = color;
                    ctx.fillRect(0, 0, width, height);
                }

                if (sliceInfo) {
                    if (sliceInfo.type === 'free') {
                        // 自由尺寸切片：完全贴合裁剪区域
                        ctx.drawImage(source, sliceInfo.srcX, sliceInfo.srcY, sliceInfo.srcW, sliceInfo.srcH, 0, 0, width, height);
                    } else {
                        // 正方形强制切片 (Slice)
                        const scale = width / sliceInfo.cellSizeW;
                        const dx = ( (sliceInfo.imgX ?? sliceInfo.videoX) - sliceInfo.cellX ) * scale;
                        const dy = ( (sliceInfo.imgY ?? sliceInfo.videoY) - sliceInfo.cellY ) * scale;
                        const dw = (sliceInfo.imgW ?? sliceInfo.videoW) * scale;
                        const dh = (sliceInfo.imgH ?? sliceInfo.videoH) * scale;
                        ctx.drawImage(source, dx, dy, dw, dh);
                    }
                } else {
                    // 普通模式：Contain 居中
                    const srcW = source.videoWidth || source.width;
                    const srcH = source.videoHeight || source.height;
                    const scale = Math.min(width / srcW, height / srcH);
                    const w = srcW * scale;
                    const h = srcH * scale;
                    const x = (width - w) / 2;
                    const y = (height - h) / 2;
                    ctx.drawImage(source, x, y, w, h);
                }

                if (removeEnabled) {
                    const targetRGB = hexToRgb(targetColorHex);
                    const imageData = ctx.getImageData(0, 0, width, height);
                    const data = imageData.data;
                    const tol = tolerance; 
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        if (Math.abs(r - targetRGB.r) < tol && Math.abs(g - targetRGB.g) < tol && Math.abs(b - targetRGB.b) < tol) {
                            data[i + 3] = 0; 
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                }
            };

            // 核心处理函数 
            const processItem = useCallback(async (item, width, height, color, outFmt, q, removeEnabled, targetColorHex, tolerance, workerUrl, currentGifConfig) => {
                if (!item.originalUrl || item.status === 'done') return item; 
                
                // --- 视频处理 ---
                if (item.type === 'video') {
                    if (!workerUrl) return { ...item, status: 'error' };
                    return new Promise((resolve) => {
                        const video = document.createElement('video');
                        video.src = item.originalUrl;
                        video.muted = true;
                        video.crossOrigin = "anonymous";
                        
                        video.onloadedmetadata = () => {
                            const fps = currentGifConfig.fps || 8;
                            const maxDuration = currentGifConfig.duration || 3;
                            const gifQuality = currentGifConfig.quality || 10;
                            const duration = Math.min(video.duration, maxDuration);
                            const interval = 1 / fps;
                            let currentTime = 0;

                            const gif = new GIF({
                                workers: 2,
                                quality: gifQuality,
                                width: width,
                                height: height,
                                workerScript: workerUrl,
                                repeat: 0,
                                background: color === 'transparent' ? 0x00000000 : null,
                                transparent: color === 'transparent' ? 0x00000000 : null
                            });

                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');

                            const captureFrame = () => {
                                if (currentTime > duration) {
                                    gif.render();
                                    return;
                                }
                                video.currentTime = currentTime;
                            };

                            video.onseeked = () => {
                                drawFrame(ctx, video, width, height, color, removeEnabled, targetColorHex, tolerance, item.sliceInfo);
                                gif.addFrame(ctx, {copy: true, delay: interval * 1000});
                                currentTime += interval;
                                captureFrame();
                            };

                            gif.on('finished', (blob) => {
                                resolve({
                                    ...item,
                                    processedUrl: URL.createObjectURL(blob),
                                    size: blob.size,
                                    status: 'done',
                                    name: item.name.endsWith('.gif') ? item.name : item.name.replace(/\.[^/.]+$/, "") + ".gif"
                                });
                            });
                            captureFrame();
                        };
                        video.onerror = () => resolve({ ...item, status: 'error' });
                    });
                }

                // --- 图片处理 ---
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = item.originalUrl;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        drawFrame(ctx, img, width, height, color, removeEnabled, targetColorHex, tolerance, item.sliceInfo);

                        canvas.toBlob((blob) => {
                            resolve({
                                ...item,
                                processedUrl: URL.createObjectURL(blob),
                                size: blob.size,
                                status: 'done',
                                name: item.name.replace(/\.[^/.]+$/, "") + (outFmt === 'image/jpeg' ? '.jpg' : '.png')
                            });
                        }, outFmt, q);
                    };
                    img.onerror = () => resolve({ ...item, status: 'error' });
                });
            }, []);

            // 批量处理队列
            useEffect(() => {
                const processQueue = async () => {
                    const itemsToProcess = items.filter(item => item.originalUrl && item.status === 'pending');
                    if (itemsToProcess.length > 0) {
                        setIsGlobalProcessing(true);
                        const processedResults = await Promise.all(
                            itemsToProcess.map(item => {
                                // 动态决定输出尺寸
                                let pWidth = targetSize.w;
                                let pHeight = targetSize.h;
                                let pColor = paddingColor;
                                let pRemoveBg = removeBgEnabled;
                                let pFormat = 'image/png';
                                let pQuality = 0.9;

                                if (item.sliceInfo && item.sliceInfo.type === 'free') {
                                    pWidth = Math.round(item.sliceInfo.srcW);
                                    pHeight = Math.round(item.sliceInfo.srcH);
                                    pColor = 'transparent'; // 自由切图强制无填充
                                    pRemoveBg = false;      // 自由切图强制不去底 (按需)
                                    pFormat = outFormat;
                                    pQuality = imageQuality;
                                }

                                return processItem(
                                    item, 
                                    pWidth, 
                                    pHeight, 
                                    pColor, 
                                    pFormat,
                                    pQuality,
                                    pRemoveBg,
                                    removeBgColor, 
                                    bgTolerance, 
                                    workerBlobUrl, 
                                    item.customConfig || gifConfig 
                                );
                            })
                        );
                        setItems(prev => prev.map(prevItem => {
                            const processed = processedResults.find(p => p.id === prevItem.id);
                            return processed || prevItem;
                        }));
                        setIsGlobalProcessing(false);
                    }
                };
                processQueue();
            }, [items, targetSize, paddingColor, outFormat, imageQuality, removeBgEnabled, removeBgColor, bgTolerance, workerBlobUrl, processItem, gifConfig]);

            // 监听设置变化时重置队列 (针对非自由切图)
            useEffect(() => {
                setItems(prev => prev.map(item => ({ ...item, status: 'pending', customConfig: null }))); 
            }, [targetSize, paddingColor, outFormat, imageQuality, removeBgEnabled, removeBgColor, bgTolerance, workerBlobUrl, gifConfig]);

            const formatSize = (bytes) => {
                if (bytes === 0) return '...';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            };

            const removeItem = (id) => setItems(prev => prev.filter(item => item.id !== id));

            const removeAll = () => {
                if (clearConfirm) {
                    setItems([]);
                    setClearConfirm(false);
                    const fileInput = document.getElementById('fileInput');
                    if (fileInput) fileInput.value = '';
                } else {
                    setClearConfirm(true);
                    setTimeout(() => setClearConfirm(false), 3000);
                }
            };

            const compressItem = (id) => {
                setItems(prev => prev.map(item => {
                    if (item.id === id) {
                        return {
                            ...item,
                            status: 'pending', 
                            customConfig: {
                                fps: 5,       
                                duration: 2.0,
                                quality: 20   
                            }
                        };
                    }
                    return item;
                }));
            };

            const downloadItem = (item) => {
                if (!item.processedUrl) return;
                const link = document.createElement('a');
                link.href = item.processedUrl;
                link.download = item.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const downloadAllZip = async () => {
                if (!window.JSZip) return alert("组件加载中...");
                setIsZipping(true);
                const zip = new JSZip();
                const folder = zip.folder("stickers");
                let count = 0;
                for (const item of items) {
                    if (item.processedUrl) {
                        try {
                            const response = await fetch(item.processedUrl);
                            const blob = await response.blob();
                            folder.file(item.name, blob);
                            count++;
                        } catch (e) { console.error(e); }
                    }
                }
                if (count > 0) {
                    const content = await zip.generateAsync({ type: "blob" });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = "stickers.zip";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
                setIsZipping(false);
            };

            // 主题 UI 配置
            const themeMap = {
                'static': { color: 'green', text: 'text-green-600', icon: 'text-green-500', iconBg: 'bg-green-100 text-green-600', borderHover: 'hover:border-green-400 hover:bg-green-50', activeBtn: 'bg-green-500 text-white border-green-500 shadow-md', bgPanel: 'bg-green-50', borderPanel: 'border-green-100' },
                'dynamic': { color: 'purple', text: 'text-purple-600', icon: 'text-purple-500', iconBg: 'bg-purple-100 text-purple-600', borderHover: 'hover:border-purple-400 hover:bg-purple-50', activeBtn: 'bg-purple-500 text-white border-purple-500 shadow-md', bgPanel: 'bg-purple-50', borderPanel: 'border-purple-100' },
                'slice': { color: 'blue', text: 'text-blue-600', icon: 'text-blue-500', iconBg: 'bg-blue-100 text-blue-600', borderHover: 'hover:border-blue-400 hover:bg-blue-50', activeBtn: 'bg-blue-500 text-white border-blue-500 shadow-md', bgPanel: 'bg-blue-50', borderPanel: 'border-blue-100' },
                'free-slice': { color: 'orange', text: 'text-orange-600', icon: 'text-orange-500', iconBg: 'bg-orange-100 text-orange-600', borderHover: 'hover:border-orange-400 hover:bg-orange-50', activeBtn: 'bg-orange-500 text-white border-orange-500 shadow-md', bgPanel: 'bg-orange-50', borderPanel: 'border-orange-100' }
            };
            const t = themeMap[mode];
            const themeColor = t.color; // Ensure themeColor is safely extracted from themeMap

            const modeCards = [
                { id: 'static', icon: Icons.ImageIcon, title: '静态表情', desc: 'JPG / PNG', activeClass: 'border-green-500 bg-green-50 text-green-700 shadow-md ring-2 ring-green-500 ring-offset-2', iconBg: 'bg-green-200', iconColor: 'text-green-700' },
                { id: 'dynamic', icon: Icons.VideoIcon, title: '动态表情', desc: '视频转GIF', activeClass: 'border-purple-500 bg-purple-50 text-purple-700 shadow-md ring-2 ring-purple-500 ring-offset-2', iconBg: 'bg-purple-200', iconColor: 'text-purple-700' },
                { id: 'slice', icon: Icons.GridIcon, title: '表情包切图', desc: '强制裁剪为正方形', activeClass: 'border-blue-500 bg-blue-50 text-blue-700 shadow-md ring-2 ring-blue-500 ring-offset-2', iconBg: 'bg-blue-200', iconColor: 'text-blue-700' },
                { id: 'free-slice', icon: Icons.Crop, title: '自由切片', desc: '维持原图比例切割', activeClass: 'border-orange-500 bg-orange-50 text-orange-700 shadow-md ring-2 ring-orange-500 ring-offset-2', iconBg: 'bg-orange-200', iconColor: 'text-orange-700' }
            ];

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8">
                <BackgroundEffects />
                
                <div className="max-w-6xl mx-auto">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl font-bold text-gray-900 mb-2">全能表情包工厂</h1>
                        <p className="text-gray-500">快速制作微信表情包 · 本地处理保护隐私</p>
                    </header>

                    {/* Mode Switcher */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        {modeCards.map(m => (
                            <button 
                                key={m.id}
                                onClick={() => { setMode(m.id); setRemoveBgEnabled(false); setItems([]); }} 
                                className={`p-3 md:p-4 rounded-3xl border-2 transition-all duration-300 flex flex-col md:flex-row items-center md:justify-center gap-2 md:gap-3 group ${mode === m.id ? m.activeClass : 'border-gray-200 bg-white text-gray-500 hover:border-gray-300 hover:bg-gray-50'}`}
                            >
                                <div className={`p-2 rounded-full ${mode === m.id ? m.iconBg : 'bg-gray-100'}`}>
                                    <m.icon size={24} className={mode === m.id ? m.iconColor : 'text-gray-400'} />
                                </div>
                                <div className="text-center md:text-left">
                                    <div className="font-bold text-sm md:text-base whitespace-nowrap">{m.title}</div>
                                    <div className="text-[10px] opacity-70 hidden md:block">{m.desc}</div>
                                </div>
                            </button>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* 左侧控制区 */}
                        <div className="lg:col-span-4 space-y-6">
                            <div 
                                className={`border-4 border-dashed rounded-3xl bg-white p-8 text-center transition-all cursor-pointer group shadow-sm relative overflow-hidden border-gray-200 ${t.borderHover}`}
                                onDragOver={(e) => e.preventDefault()}
                                onDrop={handleDrop}
                                onClick={() => document.getElementById('fileInput').click()}
                            >
                                <input 
                                    type="file" 
                                    id="fileInput" 
                                    className="hidden" 
                                    accept={mode === 'static' ? "image/*" : (mode === 'dynamic' ? "video/*" : "image/*,video/*")} 
                                    multiple 
                                    onChange={(e) => {if(e.target.files) addFiles(e.target.files); e.target.value='';}} 
                                />
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform ${t.iconBg}`}>
                                    {mode === 'static' && <Icons.Plus size={32} />}
                                    {mode === 'dynamic' && <Icons.VideoIcon size={32} />}
                                    {(mode === 'slice' || mode === 'free-slice') && <Icons.GridIcon size={32} />}
                                </div>
                                <h3 className="text-lg font-semibold text-gray-700 mb-1">
                                    {(mode === 'slice' || mode === 'free-slice') ? '点击添加素材(图/视频)' : `点击添加${mode === 'static' ? '图片' : '视频'}`}
                                </h3>
                                <p className="text-gray-400 text-xs">
                                    {mode === 'static' ? '支持批量 JPG, PNG, WEBP' : mode === 'dynamic' ? '支持 MP4, MOV' : mode === 'slice' ? '自动裁剪正方形并切图' : '按原图比例切分网格'}
                                </p>
                            </div>

                            <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-lg flex items-center gap-2"><Icons.Settings size={20} className="text-gray-400" />参数设置</h3>
                                </div>
                                <div className="space-y-6">
                                    
                                    {(mode === 'slice' || mode === 'free-slice') && (
                                        <div className={`p-4 rounded-xl ${t.bgPanel} ${t.borderPanel} border`}>
                                            <div className="flex justify-between items-center mb-3">
                                                <div className={`flex items-center gap-2 ${t.text} font-bold text-sm`}>
                                                    {mode === 'slice' ? <Icons.GridIcon size={16} /> : <Icons.Crop size={16} />}
                                                    自定义切片网格
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => { setSliceRows(3); setSliceCols(3); }} className={`text-[10px] px-2 py-1 border rounded transition-colors ${sliceRows===3 && sliceCols===3 ? `${t.activeBtn}` : `bg-white ${t.text} border-gray-200 hover:bg-white`}`}>3x3</button>
                                                    <button onClick={() => { setSliceRows(4); setSliceCols(4); }} className={`text-[10px] px-2 py-1 border rounded transition-colors ${sliceRows===4 && sliceCols===4 ? `${t.activeBtn}` : `bg-white ${t.text} border-gray-200 hover:bg-white`}`}>4x4</button>
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="space-y-1">
                                                    <div className="flex justify-between text-xs text-gray-500"><span>行数 (Rows)</span><span className={`font-mono font-bold ${t.text}`}>{sliceRows}</span></div>
                                                    <input type="range" min="1" max="8" step="1" value={sliceRows} onChange={(e) => setSliceRows(parseInt(e.target.value))} className={`w-full h-1 rounded-lg appearance-none cursor-pointer ${mode==='slice'?'bg-blue-200 accent-blue-500':'bg-orange-200 accent-orange-500'}`} />
                                                </div>
                                                <div className="space-y-1">
                                                    <div className="flex justify-between text-xs text-gray-500"><span>列数 (Cols)</span><span className={`font-mono font-bold ${t.text}`}>{sliceCols}</span></div>
                                                    <input type="range" min="1" max="8" step="1" value={sliceCols} onChange={(e) => setSliceCols(parseInt(e.target.value))} className={`w-full h-1 rounded-lg appearance-none cursor-pointer ${mode==='slice'?'bg-blue-200 accent-blue-500':'bg-orange-200 accent-orange-500'}`} />
                                                </div>
                                                <div className={`text-[10px] opacity-70 text-center pt-1 border-t ${t.borderPanel} ${t.text}`}>将生成 {sliceRows * sliceCols} 个文件</div>
                                            </div>
                                        </div>
                                    )}

                                    {/* 自由尺寸模式下的图片压缩设置 */}
                                    {mode === 'free-slice' && (
                                        <div className={`p-4 rounded-xl ${t.bgPanel} ${t.borderPanel} border`}>
                                            <div className="flex justify-between items-center mb-3">
                                                <div className={`flex items-center gap-2 ${t.text} font-bold text-sm`}>
                                                    <Icons.Sliders size={16} />
                                                    图片输出设置
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="space-y-2">
                                                    <div className="flex justify-between text-xs text-gray-500">
                                                        <span>输出格式</span>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setOutFormat('image/png')} className={`flex-1 py-1.5 text-xs border rounded transition-colors ${outFormat === 'image/png' ? `${t.activeBtn}` : `bg-white ${t.text} border-gray-200`}`}>PNG (无损)</button>
                                                        <button onClick={() => setOutFormat('image/jpeg')} className={`flex-1 py-1.5 text-xs border rounded transition-colors ${outFormat === 'image/jpeg' ? `${t.activeBtn}` : `bg-white ${t.text} border-gray-200`}`}>JPG (可压缩)</button>
                                                    </div>
                                                </div>
                                                {outFormat === 'image/jpeg' && (
                                                    <div className="space-y-2 pt-2 border-t border-orange-200/50">
                                                        <div className="flex justify-between text-xs text-gray-500"><span>画面质量</span><span className={`font-mono font-bold ${t.text}`}>{Math.round(imageQuality * 100)}%</span></div>
                                                        <input type="range" min="0.1" max="1" step="0.1" value={imageQuality} onChange={(e) => setImageQuality(parseFloat(e.target.value))} className="w-full h-1 bg-orange-200 rounded-lg appearance-none cursor-pointer accent-orange-500" />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* 非自由尺寸模式下显示 目标尺寸 和 背景处理 */}
                                    {mode !== 'free-slice' && (
                                        <>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-600 mb-2">目标尺寸 (单张)</label>
                                                <div className="flex flex-wrap gap-2">
                                                    {sizePresets.map(preset => (
                                                        <button key={preset.label} onClick={() => setTargetSize({ w: preset.w, h: preset.h })} className={`py-2 px-3 rounded-xl text-xs font-medium border transition-all ${targetSize.w === preset.w && targetSize.h === preset.h ? t.activeBtn : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300'}`}>{preset.label}</button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium text-gray-600 mb-2">背景处理</label>
                                                <div className="flex gap-2 mb-3">
                                                    <button onClick={() => setPaddingColor('transparent')} className={`flex-1 py-2 rounded-xl text-xs font-medium border flex items-center justify-center gap-2 ${paddingColor === 'transparent' ? `ring-2 ring-${themeColor}-500 border-${themeColor}-500 bg-${themeColor}-50 text-${themeColor}-700` : 'border-gray-200'}`}><div className="w-3 h-3 rounded border bg-gray-100" style={{backgroundImage: 'linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%)', backgroundSize: '4px 4px'}}></div>透明</button>
                                                    <button onClick={() => setPaddingColor('white')} className={`flex-1 py-2 rounded-xl text-xs font-medium border flex items-center justify-center gap-2 ${paddingColor === 'white' ? `ring-2 ring-${themeColor}-500 border-${themeColor}-500 bg-white text-gray-900` : 'border-gray-200'}`}><div className="w-3 h-3 rounded border border-gray-300 bg-white"></div>白色</button>
                                                    <label className={`flex-1 py-2 rounded-xl text-xs font-medium border flex items-center justify-center gap-2 cursor-pointer ${paddingColor !== 'transparent' && paddingColor !== 'white' ? `ring-2 ring-${themeColor}-500 border-${themeColor}-500 bg-white text-gray-900` : 'border-gray-200'}`}>
                                                        <input type="color" className="opacity-0 w-0 h-0 absolute" value={paddingColor === 'transparent' ? '#ffffff' : paddingColor} onChange={(e) => setPaddingColor(e.target.value)} />
                                                        <div className="w-3 h-3 rounded border border-gray-300" style={{backgroundColor: paddingColor !== 'transparent' ? paddingColor : 'transparent'}}></div>
                                                        <span className="flex items-center gap-1"><Icons.Palette size={12}/>自定义</span>
                                                    </label>
                                                </div>

                                                <div className={`p-3 rounded-xl border transition-colors ${removeBgEnabled ? 'bg-blue-50 border-blue-200' : 'bg-gray-50 border-transparent'}`}>
                                                    <div className="flex items-center justify-between mb-3">
                                                        <label className="flex items-center gap-2 cursor-pointer select-none">
                                                            <div className={`w-5 h-5 rounded border flex items-center justify-center ${removeBgEnabled ? 'bg-blue-500 border-blue-500' : 'bg-white border-gray-300'}`}>{removeBgEnabled && <Icons.CheckCircle size={14} className="text-white" />}</div>
                                                            <input type="checkbox" className="hidden" checked={removeBgEnabled} onChange={(e) => setRemoveBgEnabled(e.target.checked)} />
                                                            <span className={`text-sm font-medium ${removeBgEnabled ? 'text-blue-700' : 'text-gray-600'}`}>去除背景</span>
                                                        </label>
                                                        <button onClick={openEyeDropper} title="吸取屏幕颜色 (仅支持 Chrome 桌面版)" className={`p-1.5 rounded-lg hover:bg-blue-100 transition-colors ${removeBgEnabled ? 'text-blue-600' : 'text-gray-400'}`}>
                                                            <Icons.Pipette size={16} />
                                                        </button>
                                                    </div>
                                                    
                                                    {removeBgEnabled && (
                                                        <div className="space-y-3 pt-2 border-t border-blue-100">
                                                            <div className="flex items-center justify-between">
                                                                <span className="text-xs text-blue-600">目标颜色</span>
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-xs font-mono text-gray-500">{removeBgColor}</span>
                                                                    <div className="relative w-6 h-6 rounded-full border border-gray-300 overflow-hidden shadow-sm">
                                                                        <input type="color" value={removeBgColor} onChange={(e) => setRemoveBgColor(e.target.value)} className="absolute -top-2 -left-2 w-10 h-10 cursor-pointer" />
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div>
                                                                <div className="flex justify-between text-xs text-blue-600 mb-1"><span>容差 (相似度)</span><span>{bgTolerance}</span></div>
                                                                <input type="range" min="1" max="100" value={bgTolerance} onChange={(e) => setBgTolerance(parseInt(e.target.value))} className="w-full h-1.5 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-500" />
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {/* 动态和强制切片模式下的 GIF 压缩设置 */}
                                    {(mode === 'dynamic' || mode === 'slice') && (
                                        <div className="space-y-4 p-4 rounded-xl bg-purple-50 border border-purple-100">
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center gap-2 text-purple-800">
                                                    <Icons.Sliders size={16} />
                                                    <h4 className="font-bold text-sm">GIF 压缩设置</h4>
                                                </div>
                                                <div className="flex gap-1.5">
                                                    <button onClick={() => setGifConfig({fps: 8, quality: 10, duration: 3})} className={`text-[10px] px-2 py-1 border rounded transition-colors ${gifConfig.fps===8 ? 'bg-purple-600 text-white border-purple-600' : 'bg-white border-purple-200 text-purple-600'}`}>标准</button>
                                                    <button onClick={() => setGifConfig({fps: 5, quality: 10, duration: 3})} className={`text-[10px] px-2 py-1 border rounded transition-colors ${gifConfig.fps===5 ? 'bg-purple-600 text-white border-purple-600' : 'bg-white border-purple-200 text-purple-600'}`}>500K限制</button>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                <div className="flex justify-between text-xs text-gray-500"><span>帧率</span><span className="text-purple-700">{gifConfig.fps} FPS</span></div>
                                                <input type="range" min="1" max="15" value={gifConfig.fps} onChange={(e) => setGifConfig({...gifConfig, fps: parseInt(e.target.value)})} className="w-full h-1 bg-purple-200 rounded-lg accent-purple-500" />
                                                <div className="flex justify-between text-xs text-gray-500"><span>时长</span><span className="text-purple-700">{gifConfig.duration}s</span></div>
                                                <input type="range" min="1" max="10" step="0.5" value={gifConfig.duration} onChange={(e) => setGifConfig({...gifConfig, duration: parseFloat(e.target.value)})} className="w-full h-1 bg-purple-200 rounded-lg accent-purple-500" />
                                            </div>
                                        </div>
                                    )}

                                    {items.length > 0 && (
                                        <div className="pt-4 border-t border-gray-100 space-y-3">
                                            <button onClick={downloadAllZip} disabled={isZipping} className={`w-full py-3 text-white rounded-xl font-bold shadow-md active:scale-95 transition-all flex items-center justify-center gap-2 ${isZipping ? 'bg-gray-400' : `bg-${themeColor}-600 hover:bg-${themeColor}-700`}`}>
                                                {isZipping ? <Icons.RefreshCw className="animate-spin" size={18}/> : <Icons.Package size={18} />}
                                                {isZipping ? '正在打包...' : `打包下载全部 (${items.length})`}
                                            </button>
                                            <button onClick={removeAll} className={`w-full py-2 rounded-xl text-sm font-medium flex items-center justify-center gap-2 transition-colors ${clearConfirm ? 'bg-red-500 text-white' : 'text-red-500 hover:bg-red-50'}`}>
                                                <Icons.Trash2 size={16} />{clearConfirm ? '确定清空？' : '清空列表'}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                            
                            {/* 左侧广告位 */}
                            <AdUnit slot="9876543210" />
                        </div>

                        {/* 右侧结果区 */}
                        <div className="lg:col-span-8">
                            <div className="bg-white rounded-3xl shadow-lg border border-gray-100 p-6 min-h-[500px]">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className={`font-bold text-gray-800 flex items-center gap-2`}><Icons.FileImage size={20} className={t.icon}/>处理结果 ({items.length})</h3>
                                    {isGlobalProcessing && <span className={`text-sm flex items-center gap-2 animate-pulse ${t.text}`}><Icons.RefreshCw size={14} className="animate-spin"/>处理中...</span>}
                                </div>

                                {items.length > 0 ? (
                                    <div 
                                        className="grid gap-4"
                                        style={{ gridTemplateColumns: (mode === 'slice' || mode === 'free-slice') ? `repeat(${sliceCols}, minmax(0, 1fr))` : 'repeat(auto-fill, minmax(140px, 1fr))' }}
                                    >
                                        {items.map(item => (
                                            <div key={item.id} className="relative group bg-gray-50 rounded-xl border border-gray-200 p-3 hover:shadow-md transition-shadow">
                                                <button onClick={() => removeItem(item.id)} className="absolute top-2 right-2 z-10 p-1.5 bg-white text-gray-400 hover:text-red-500 rounded-full shadow-sm opacity-0 group-hover:opacity-100 transition-opacity"><Icons.X size={14} /></button>
                                                <div className="bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIi8+CjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNlNWU1ZTUiLz4KPHJlY3QgeD0iNCIgeT0iNCIgd2lkdGg9IjQiIGhlaWdodD0iNCIgZmlsbD0iI2U1ZTVlNSIvPgo8L3N2Zz4=')] rounded-lg overflow-hidden flex items-center justify-center mb-3 border border-gray-100 relative" style={{ aspectRatio: item.sliceInfo?.type === 'free' ? `${item.sliceInfo.srcW}/${item.sliceInfo.srcH}` : `${targetSize.w}/${targetSize.h}` }}>
                                                    {item.processedUrl ? (
                                                        <img src={item.processedUrl} alt="processed" className="max-w-full max-h-full object-contain" />
                                                    ) : (
                                                        <div className="flex flex-col items-center">
                                                            <Icons.RefreshCw className="animate-spin text-gray-400 mb-2" />
                                                            <span className="text-xs text-gray-400">{item.type==='video'?'转换中...':'处理中...'}</span>
                                                        </div>
                                                    )}
                                                    {/* GIF/Video Badges and Overlay Buttons */}
                                                    {item.type === 'video' && item.processedUrl && (
                                                        <>
                                                            <div className="absolute bottom-1 right-1 bg-black/50 text-white text-[10px] px-1 rounded">GIF</div>
                                                            {/* Smart Compress Button if size > 500KB */}
                                                            {item.size > 500 * 1024 && mode !== 'free-slice' && (
                                                                <button 
                                                                    onClick={(e) => { e.stopPropagation(); compressItem(item.id); }}
                                                                    className="absolute top-1 left-1 bg-red-500 hover:bg-red-600 text-white text-[10px] px-2 py-1 rounded shadow-sm flex items-center gap-1 transition-colors"
                                                                    title="文件过大，点击一键优化到 500KB 以下"
                                                                >
                                                                    <Icons.Compress size={10} />
                                                                    压缩
                                                                </button>
                                                            )}
                                                        </>
                                                    )}
                                                    {(mode === 'slice' || mode === 'free-slice') && item.name.match(/_(\d+)\.(png|jpg|jpeg|gif)$/) && (
                                                        <div className="absolute top-1 left-1 bg-black/40 backdrop-blur-sm text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold shadow-sm">
                                                            {item.name.match(/_(\d+)\.(png|jpg|jpeg|gif)$/)[1]}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="space-y-1">
                                                    <div className="flex justify-between items-center text-xs text-gray-500">
                                                        <span className="truncate max-w-[80px]" title={item.name}>{item.name}</span>
                                                        <span className={`${item.size > 500 * 1024 ? 'text-red-500 font-bold' : `text-${themeColor}-600`}`}>{formatSize(item.size)}</span>
                                                    </div>
                                                    <button onClick={() => downloadItem(item)} disabled={!item.processedUrl} className="w-full mt-2 py-1.5 bg-white border border-gray-200 hover:border-green-500 hover:text-green-600 text-gray-600 rounded-lg text-xs font-medium transition-colors flex items-center justify-center gap-1"><Icons.Download size={12} />下载</button>
                                                </div>
                                            </div>
                                        ))}
                                        {/* 继续添加按钮：非切图模式显示继续添加，切图模式下在空状态显示网格占位 */}
                                        {(mode !== 'slice' && mode !== 'free-slice') && (
                                            <div onClick={() => document.getElementById('fileInput').click()} className={`border-2 border-dashed border-gray-200 rounded-xl flex flex-col items-center justify-center text-gray-400 transition-colors cursor-pointer min-h-[160px] ${t.borderHover} hover:${t.text}`}><Icons.Plus size={24} className="mb-2" /><span className="text-sm font-medium">继续添加</span></div>
                                        )}
                                    </div>
                                ) : (
                                    /* Empty State */
                                    (mode === 'slice' || mode === 'free-slice') ? (
                                        <div className="h-full flex flex-col items-center justify-center p-8 text-gray-300 border-2 border-dashed border-gray-100 rounded-2xl min-h-[500px]">
                                             <div 
                                                className="grid gap-2 w-full max-w-md aspect-square"
                                                style={{ 
                                                    gridTemplateColumns: `repeat(${sliceCols}, minmax(0, 1fr))`,
                                                    gridTemplateRows: `repeat(${sliceRows}, minmax(0, 1fr))`
                                                }}
                                             >
                                                {Array.from({ length: sliceRows * sliceCols }).map((_, i) => (
                                                    <div 
                                                        key={i} 
                                                        onClick={() => document.getElementById('fileInput').click()}
                                                        className={`border-2 border-dashed border-gray-200 rounded-lg bg-gray-50 flex items-center justify-center ${t.borderHover} transition-colors cursor-pointer`}
                                                    >
                                                        <span className="text-xs text-gray-300 font-mono">{i + 1}</span>
                                                    </div>
                                                ))}
                                             </div>
                                             <p className="text-sm mt-6 text-gray-400">点击任意格子上传素材，自动切分为 {sliceRows}x{sliceCols}</p>
                                        </div>
                                    ) : (
                                        <div className="h-64 flex flex-col items-center justify-center text-gray-300 border-2 border-dashed border-gray-100 rounded-2xl">
                                            <p className="text-sm">暂无素材，请在左侧添加</p>
                                        </div>
                                    )
                                )}
                            </div>
                        </div>
                    </div>

                    {/* SEO 优化文本区域 */}
                    <article className="mt-16 pt-12 border-t border-gray-200 max-w-4xl mx-auto seo-content">
                        <h2>关于全能表情包制作神器</h2>
                        <p>欢迎使用我们的在线表情包处理工具。这是一个完全免费、纯前端（本地运行）的图片和视频处理平台，旨在帮助您轻松制作符合微信表情开放平台标准的表情包素材。无论您是专业的表情包设计师，还是想制作有趣群聊斗图的普通用户，这里都能满足您的需求。</p>
                        
                        <h3>主要功能特色</h3>
                        <ul>
                            <li><strong>智能尺寸调整：</strong>一键将图片调整为微信标准的 240x240、120x120 或 750x400 像素，自动居中并填充透明或白色背景，无需复杂的 PS 操作。</li>
                            <li><strong>视频转动态表情 (GIF)：</strong>支持 MP4、MOV 等格式视频直接转换为 GIF 动图。独家算法自动优化帧率和画质，支持一键压缩至 500KB 以下，完美适配微信添加限制。</li>
                            <li><strong>多模式切图：</strong>支持将图片或视频切割为网格。您可以选择“强制正方形切图”适合表情包制作，或者选择“自由切图”完美保留原图比例进行任意网格（最高 8x8）切割。</li>
                            <li><strong>智能去底色（绿幕抠图）：</strong>新增自定义吸管工具，可提取视频或图片中任意背景色并将其变透明，完美支持视频抠图换底。</li>
                            <li><strong>隐私安全保护：</strong>本工具所有处理均在您的浏览器本地完成，不会将您的原图或视频上传到任何服务器，绝对保障您的素材隐私安全。</li>
                        </ul>

                        <h3>常见问题 (FAQ)</h3>
                        <p><strong>Q: 生成的 GIF 太大无法添加到微信怎么办？</strong><br/>A: 请使用我们特有的“一键压缩”功能。在动态表情模式下，如果结果超过 500KB，图片左上角会出现红色的压缩按钮，点击即可自动优化参数。</p>
                        <p><strong>Q: 切图模式支持自定义行列吗？</strong><br/>A: 支持。在“切图”模式下，您可以自由拖动滑块设置 1x1 到 8x8 的任意网格布局，右侧预览区会实时显示切割效果空位，非常直观。</p>
                    </article>

                    <footer className="mt-16 pt-8 border-t border-gray-200">
                        {/* 底部广告位 */}
                        <AdUnit slot="1234567890" format="horizontal" />
                        
                        <div className="flex flex-col md:flex-row justify-center items-center gap-8 text-center md:text-left mt-8">
                            <div className="flex flex-col items-center gap-2">
                                <div className="w-32 h-32 bg-white rounded-xl flex items-center justify-center border border-gray-200 overflow-hidden shadow-sm">
                                    <img src="add.png" alt="添加作者" className="w-full h-full object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.parentNode.classList.add('bg-gray-50'); e.target.parentNode.innerHTML = '<div class="flex flex-col items-center gap-1 text-gray-300"><span class="text-[10px]">add.png</span></div>'; }} />
                                </div>
                                <span className="text-sm font-bold text-gray-600 flex items-center gap-1"><Icons.UserPlus size={14} className="text-blue-500"/> 添加作者</span>
                            </div>
                        </div>
                        <div className="mt-8 text-center text-gray-400 text-xs">
                            <p>本工具纯前端运行，您的图片不会上传到任何服务器。</p>
                            <p className="mt-2">
                                <button onClick={() => setShowPrivacy(true)} className="hover:text-blue-500 underline">隐私权政策</button>
                            </p>
                        </div>
                    </footer>

                    {showPrivacy && <PrivacyModal onClose={() => setShowPrivacy(false)} />}
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
